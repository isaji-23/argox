# Local single-command stack for development and the TFM demo (DEPLOY-01).
#
#   docker compose up --build            # Collector + Dashboard + Azurite
#   docker compose --profile otel up     # ... plus the OTel collector sidecar
#
# See README.md in this directory for ports, environment variables and how to
# seed demo data.

name: argox

services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.35.0
    restart: unless-stopped
    # Blob service only: the Collector storage backend needs nothing else.
    # --skipApiVersionCheck: the azure-storage-blob SDK pinned by the
    # Collector may request a service API version newer than the Azurite
    # release; the emulator rejects it otherwise (InvalidHeaderValue).
    command: azurite-blob --blobHost 0.0.0.0 --blobPort 10000 --location /data --skipApiVersionCheck
    ports:
      # Loopback only: the stack has no auth (COL-09), so the blob endpoint
      # must not be reachable beyond the host.
      - "127.0.0.1:10000:10000"
    volumes:
      - azurite-data:/data
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "10000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  collector:
    build:
      context: ../../argox-project/argox-collector
    image: argox-collector:local
    restart: unless-stopped
    environment:
      ARGOX_ENVIRONMENT: local
      ARGOX_LOG_LEVEL: INFO
      ARGOX_STORAGE_BACKEND: azure
      # Azurite's well-known development credentials (public, not a secret):
      # https://learn.microsoft.com/azure/storage/common/storage-use-azurite#well-known-storage-account-and-key
      ARGOX_STORAGE_AZURE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;"
      ARGOX_STORAGE_AZURE_CONTAINER: argox
      ARGOX_INDEX_DUCKDB_PATH: /data/index.duckdb
      # Allow the nginx-served dashboard and the Vite dev server to call the
      # API directly; same-origin calls through the nginx proxy need neither.
      ARGOX_CORS_ORIGINS: http://localhost:8080,http://localhost:5173
    ports:
      # Loopback only: no auth yet (COL-09), keep the API off the LAN.
      - "127.0.0.1:${COLLECTOR_PORT:-8000}:8000"
    volumes:
      - collector-data:/data
    depends_on:
      azurite:
        condition: service_healthy
    # Healthcheck (GET /healthz) is baked into the image Dockerfile.

  dashboard:
    build:
      context: ../../argox-dashboard
    image: argox-dashboard:local
    restart: unless-stopped
    ports:
      # Loopback only; override when 8080 is taken on the host:
      # DASHBOARD_PORT=8088 docker compose up
      - "127.0.0.1:${DASHBOARD_PORT:-8080}:80"
    depends_on:
      collector:
        condition: service_healthy
    # Healthcheck (wget /) is baked into the image Dockerfile.

  # Optional sidecar for protocol-level inspection: point any OTLP SDK at
  # localhost:4318 (HTTP) or localhost:4317 (gRPC); spans are dumped to the
  # sidecar's stdout and forwarded to the Collector.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    profiles: ["otel"]
    command: ["--config=/etc/otelcol/config.yaml"]
    restart: unless-stopped
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      # Loopback only: receivers/health probe stay on the host.
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
      - "127.0.0.1:13133:13133"
    depends_on:
      collector:
        condition: service_healthy
    # No container healthcheck: the image is distroless (no shell, wget or nc
    # to run a probe with). The health_check extension serves
    # http://localhost:13133/ for probing from the host instead.

volumes:
  azurite-data:
  collector-data:
