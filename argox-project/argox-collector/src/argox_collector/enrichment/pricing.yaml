# Per-model LLM pricing used by the cost enricher (COL-07).
#
# Prices are USD per 1,000 tokens. Keys are matched case-insensitively against
# the GenAI `gen_ai.request.model` / `gen_ai.response.model` span attribute.
# Override with `ARGOX_PRICING_TABLE_PATH` to supply a custom table; unknown
# models log a warning and skip cost calculation.
models:
  # OpenAI
  gpt-4o:
    input: 0.0025
    output: 0.01
  gpt-4o-mini:
    input: 0.00015
    output: 0.0006
  gpt-4.1:
    input: 0.002
    output: 0.008
  gpt-4.1-mini:
    input: 0.0004
    output: 0.0016
  gpt-4.1-nano:
    input: 0.0001
    output: 0.0004
  gpt-4-turbo:
    input: 0.01
    output: 0.03
  gpt-4:
    input: 0.03
    output: 0.06
  gpt-3.5-turbo:
    input: 0.0005
    output: 0.0015
  o3:
    input: 0.002
    output: 0.008
  o3-mini:
    input: 0.0011
    output: 0.0044
  o4-mini:
    input: 0.0011
    output: 0.0044
  text-embedding-3-small:
    input: 0.00002
    output: 0.0
  text-embedding-3-large:
    input: 0.00013
    output: 0.0
  # Azure OpenAI deployments commonly mirror the OpenAI model names; the ones
  # below are the Azure-specific spellings.
  gpt-35-turbo:
    input: 0.0005
    output: 0.0015
  gpt-35-turbo-16k:
    input: 0.003
    output: 0.004
