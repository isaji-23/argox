# Per-model LLM pricing used by the basic cost enricher (COL-03).
#
# Prices are USD per 1,000 tokens. Keys are matched case-insensitively against
# the GenAI `gen_ai.request.model` / `gen_ai.response.model` span attribute.
# This is a small seed table; the full per-model worker lands in COL-07 (#92).
models:
  # OpenAI
  gpt-4o:
    input: 0.0025
    output: 0.01
  gpt-4o-mini:
    input: 0.00015
    output: 0.0006
  gpt-4-turbo:
    input: 0.01
    output: 0.03
  gpt-3.5-turbo:
    input: 0.0005
    output: 0.0015
  # Azure OpenAI deployments commonly mirror the OpenAI model names.
  gpt-35-turbo:
    input: 0.0005
    output: 0.0015
