# Serves the built dashboard and reverse-proxies API calls to the Collector.
# Keeping the API same-origin means the browser needs no CORS at all in the
# composed stack; ARGOX_CORS_ORIGINS is only needed when the dashboard is
# served from elsewhere (e.g. the Vite dev server).
#
# This config assumes the Docker Compose network from
# deploy/docker/compose.yaml. The `collector` hostname is resolved at request
# time (Docker's embedded DNS at 127.0.0.11) via a variable upstream, so a
# Collector container restart with a new IP does not leave nginx serving a
# stale address until reload.

server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=10s;

    root /usr/share/nginx/html;
    index index.html;

    # Match the Collector's ingest limit (ARGOX_MAX_PAYLOAD_SIZE, 10 MB default)
    # so proxied OTLP batches are not capped at nginx's 1 MB default and
    # rejected with 413 before reaching the Collector.
    client_max_body_size 10m;

    # Query and policy APIs (GET /api/v1/traces, /api/v1/policies, ...).
    location /api/ {
        set $collector_upstream http://collector:8000;
        proxy_pass $collector_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OTLP ingest (POST /v1/traces), handy for browser-side demos.
    location /v1/ {
        set $collector_upstream http://collector:8000;
        proxy_pass $collector_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: unknown paths render the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
