# Serves the built dashboard and reverse-proxies API calls to the Collector.
# Keeping the API same-origin means the browser needs no CORS at all in the
# composed stack; ARGOX_CORS_ORIGINS is only needed when the dashboard is
# served from elsewhere (e.g. the Vite dev server).
#
# The `collector` hostname is resolved at nginx startup, so this config
# assumes the Docker Compose network from deploy/docker/compose.yaml.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Query and policy APIs (GET /api/v1/traces, /api/v1/policies, ...).
    location /api/ {
        proxy_pass http://collector:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OTLP ingest (POST /v1/traces), handy for browser-side demos.
    location /v1/ {
        proxy_pass http://collector:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: unknown paths render the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
